<header class="config-shell">
  <div class="config-shell__bar">
    <a class="config-shell__brand" href="/" aria-label="Flatland Dispatcher — start">
      <img class="config-shell__logo" src="/ai4realnet_logo.svg" alt="AI4REALNET" />
      <span class="config-shell__title">
        <span class="config-shell__title-main">Flatland Dispatcher</span>
        <span class="config-shell__title-sub">Configuration</span>
      </span>
    </a>

    <nav class="config-shell__nav" aria-label="Configuration areas">
      <a
        class="config-shell__item"
        [class.is-active]="active === 'designer'"
        [attr.aria-current]="active === 'designer' ? 'page' : null"
        href="/designer">
        <svg class="config-shell__ico" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="16" rx="1" />
          <line x1="9" y1="4" x2="9" y2="20" />
          <line x1="15" y1="4" x2="15" y2="20" />
        </svg>
        Layout Designer
      </a>
      <a
        class="config-shell__item"
        [class.is-active]="active === 'infrastructure-builder'"
        [attr.aria-current]="active === 'infrastructure-builder' ? 'page' : null"
        href="/infrastructure-builder">
        <svg class="config-shell__ico" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h16" />
          <path d="M4 12h16" />
          <path d="M4 18h16" />
          <path d="M7 4v16" />
          <path d="M17 4v16" />
        </svg>
        Infrastructure Builder
      </a>
      <a
        class="config-shell__item"
        [class.is-active]="active === 'gallery'"
        [attr.aria-current]="active === 'gallery' ? 'page' : null"
        href="/gallery">
        <svg class="config-shell__ico" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        Tile Gallery
      </a>

      <span class="config-shell__spacer"></span>

      <span class="config-shell__slot">
        <ng-content select="[configActions]"></ng-content>
      </span>
    </nav>
  </div>
</header>
