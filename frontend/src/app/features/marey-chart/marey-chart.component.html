<div class="marey-shell">
  @if (pathCells().length === 0) {
    <div class="marey-empty">
      <p>Select an agent to see its time–distance trajectory.</p>
    </div>
  } @else {
    <svg
      class="marey-svg"
      [attr.viewBox]="'0 0 ' + W + ' ' + H"
      preserveAspectRatio="xMidYMid meet"
    >
      <g class="marey-grid">
        @for (t of yTicks(); track t.v) {
          <line [attr.x1]="PAD.left" [attr.x2]="W - PAD.right"
                [attr.y1]="t.y" [attr.y2]="t.y" />
          <text [attr.x]="PAD.left - 8" [attr.y]="t.y + 4" text-anchor="end">
            {{ t.v }}
          </text>
        }
      </g>

      <g class="marey-now">
        <line
          [attr.x1]="PAD.left" [attr.x2]="W - PAD.right"
          [attr.y1]="nowY()"   [attr.y2]="nowY()"
        />
        <text [attr.x]="W - PAD.right + 4" [attr.y]="nowY() + 4">now</text>
      </g>

      <g class="marey-lines">
        @for (line of agentLines(); track line.handle) {
          <g [class.is-active]="line.isActive">
            @if (line.pastD) {
              <path class="past"
                    [attr.d]="line.pastD"
                    [attr.stroke]="line.color" />
            }
            @if (line.futureD) {
              <path class="future"
                    [attr.d]="line.futureD"
                    [attr.stroke]="line.color" />
            }
          </g>
        }
      </g>

      <text class="marey-axis-label" [attr.x]="W / 2" [attr.y]="H - 8"
            text-anchor="middle">
        Position along active agent's path
      </text>
      <text class="marey-axis-label" [attr.x]="14" [attr.y]="H / 2"
            text-anchor="middle"
            [attr.transform]="'rotate(-90 14 ' + (H/2) + ')'">
        Time (steps)
      </text>
    </svg>
  }
</div>
