<div class="timetable">
  @if (rows().length === 0) {
    <p class="tt-empty">No trains in this scenario.</p>
  } @else {
    <table class="tt-table">
      <thead>
        <tr>
          <th class="tt-train">Train</th>
          <th>From</th>
          <th>To</th>
          <th class="tt-num">Dep</th>
          <th class="tt-num">Arr</th>
          <th>Now</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        @for (r of rows(); track r.handle) {
          <tr>
            <td class="tt-train">
              <span class="tt-chip" [style.background]="r.color"></span>
              <span class="tt-train-id">#{{ r.handle }}</span>
            </td>
            <td class="tt-stop">{{ r.from }}</td>
            <td class="tt-stop">{{ r.to }}</td>
            <td class="tt-num">{{ r.departure ?? '—' }}</td>
            <td class="tt-num">{{ r.arrival ?? '—' }}</td>
            <td class="tt-now">{{ r.now }}</td>
            <td class="tt-status" [attr.data-tone]="r.tone">{{ r.status }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
